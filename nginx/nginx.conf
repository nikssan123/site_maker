upstream frontend  { server frontend:5173; }
upstream backend   { server backend:4000; }
upstream apprunner { server app-runner:4001; }

log_format debug_preview '$time_iso8601 | $status | $request_time s | '
                         'upstream=$upstream_addr upstream_status=$upstream_status '
                         'upstream_connect=$upstream_connect_time upstream_header=$upstream_header_time '
                         'upstream_resp=$upstream_response_time | '
                         '$request_method $request_uri';

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=300r/m;

# Main AppMaker UI + API. Include every hostname you use in the browser (127.0.0.1 is not the same as "localhost" for nginx matching).
# Only the custom-domain block below should be default_server — otherwise bare IP hits /hosted/ and returns "Domain not found or not verified".
server {
    listen 80;
    listen [::]:80;
    server_name localhost 127.0.0.1 [::1] projectmaker.com www.projectmaker.com;
    client_max_body_size 10M;

    # AI endpoints — rate limited aggressively
    location /api/generate {
        limit_req zone=ai_limit burst=5 nodelay;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/iterate {
        limit_req zone=ai_limit burst=5 nodelay;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # All other API routes
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # /preview-app/<id> without trailing slash breaks relative asset URLs in the iframe — force /<id>/
    location ~ ^/preview-app/[^/]+$ {
        return 308 $scheme://$host$uri/$is_args$args;
    }

    # Preview proxy — routes to app-runner (may autostart Node + first-byte can exceed 60s default)
    # Do NOT force Connection: upgrade here: normal iframe GETs have no Upgrade header; sending
    # Connection: upgrade anyway breaks some upstreams and yields immediate 502/504.
    location /preview-app/ {
        access_log /dev/stdout debug_preview;
        error_log  /dev/stderr info;

        proxy_pass http://apprunner/preview/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # Frontend (React SPA)
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Hosted apps: CNAME target <projectId>.sites.lvh.me (dev) or <projectId>.sites.projectmaker.com (prod)
# Must match HOSTING_SITES_HOST in backend .env
server {
    listen 80;
    server_name "~^(?<prjid>[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})\.sites\.(lvh\.me|projectmaker\.com)";

    location / {
        proxy_pass http://apprunner/preview/$prjid$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Custom user domains (e.g. app.mysite.com CNAMEd to <projectId>.sites.projectmaker.com).
# Nginx sees Host: app.mysite.com — resolve project via app-runner which caches the lookup.
server {
    listen 80 default_server;
    server_name _;

    location / {
        proxy_pass http://apprunner/hosted/;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
